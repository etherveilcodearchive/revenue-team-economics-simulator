name: EV-SIM Static Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'public/**'
      - 'functions/**'
      - '.github/workflows/ev-sim-static-check.yml'
      - '.github/ISSUE_TEMPLATE/ev-sim-build-brief.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  static-check:
    name: Static route and file guardrail check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify expected static structure
        shell: bash
        run: |
          set -euo pipefail
          test -d public
          test -f public/index.html
          test -f public/simulator.html
          test -f CHANGELOG.md

      - name: Verify preserved simulator routes if present
        shell: bash
        run: |
          set -euo pipefail
          for file in public/simulator.html public/simulator-v13.html public/simulator-v14.html public/simulator-v15.html public/simulator-v20.html; do
            if [ -f "$file" ]; then
              echo "found $file"
            else
              echo "optional route missing: $file"
            fi
          done

      - name: Confirm workflow has no deployment or secret action
        shell: bash
        run: |
          set -euo pipefail
          if grep -R "CLOUDFLARE_API_TOKEN\|OPENAI_API_KEY\|MINIMAX\|wrangler deploy\|pages deploy" .github/workflows; then
            echo "Blocked: workflow references a forbidden secret or deployment command."
            exit 1
          fi
          echo "No forbidden secret/deployment references found in workflows."
